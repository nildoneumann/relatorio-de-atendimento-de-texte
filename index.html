<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Relatório de Atendimento de Ocorrência</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon2-192.png">
  <meta name="theme-color" content="#ffffff">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      padding: 15px;
      font-size: 16px;
      font-weight: bold;
      max-width: 900px;
      margin: auto;
      color: #15400e;
      background-color: #0088FF;
    }
    h1 { text-align: center; font-size: 22px; margin-top: 1px; color: blue; }
    .logo-container {
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
      gap: 10px; margin-bottom: 10px; background-color: #FFFFFF; border-radius: 4px;
    }
    .logo { width: 120px; max-width: 30%; height: auto; }
    .linha-horizontal, .linha-horizontal-2, .linha-horizontal-3 {
      display: flex; gap: 10px; flex-wrap: wrap; margin-top: 1px;
    }
    .linha-horizontal label, .linha-horizontal-2 label, .linha-horizontal-3 label {
      flex: 1; min-width: 180px;
    }
    label { display: block; margin-top: 7px; }
    input[type="text"], input[type="date"], input[type="time"], textarea {
      width: 100%; padding: 5px; font-weight: bold; font-size: 15px;
      color: blue; border-radius: 4px;
    }
    textarea {
      height: auto; min-height: 220px; color: blue; font-family: Arial, sans-serif; font-size: 14px;
    }
    .btn {
      margin-top: 8px; padding: 10px 15px; font-weight: bold; font-size: 18px;
      background-color: #D6FFFF; color: blue; border-radius: 10px;
      cursor: pointer; width: 100%;
    }
    .botao {
      color: #FFFFFF; padding: 10px 15px; text-align: center; display: inline-block; border: 1px solid white;
      font-size: 17px; cursor: pointer; border-radius: 10px; width: 100%; background-color: green; text-decoration: none;
    }
    .btn:not(:last-child) { margin-bottom: 10px; }

    button[type="button"] {margin-top: 10px; padding: 8px 15px; font-weight: bold; font-size: 19px;
      background-color: #b7d5ac; color: blue; border-radius: 10px;
      cursor: pointer; width: 100%; margin-bottom: 8px;
    }
    p {
      color: red; margin-top: 1px; font-size: 12px; text-align: center; padding: 2px; background-color: #ffffc5;
    }
    #pdf-content { background-color: #D6FFFF; padding: 15px 10px; border-radius: 4px; }
    canvas#assinatura { border: 1px solid #000; }
    .neumann { font-size: 9px; color: black; text-align: right; margin-bottom: 16px; }
    .equipe { margin-top: 3px; background-color: #dbead5; padding: 5px 3px; border-radius: 4px; color: #132c0d; }
     .digital { margin-top: 7px; padding: 10px 15px; font-weight: bold; font-size: 18px;
      background-color: green; color: blue; border-radius: 10px;
      cursor: pointer; width: 100%; }
    /* 🔹 Ajustes para fotos */
    #fotos-container {
      margin-top: 5px;
    }
    .foto-box {
      margin-bottom: 5px;
      page-break-inside: avoid; /* evita cortar foto no meio */
      break-inside: avoid;
      text-align: center;
    }
    .foto-box img {
      max-width: 100%;
      max-height: 200px; /* garante que caiba em uma página A4 */
      object-fit: contain;
      border: 1px solid #000;
      border-radius: 5px;
    }
  </style>
</head>
<body>
<label for="nome" style="font-size: 8px; color:yellow;">© 2025 Leonildo.Neumann</label>
<div id="pdf-content">
  <div class="logo-container">
    <img src="logo-smdsm.png" crossorigin="anonymous" alt="Prefeitura" class="logo">
    <label for="nome" style="font-size: 26px; color: red; ">TESTE</label>
    <img src="logo-setran.png" crossorigin="anonymous" alt="Setran" class="logo">
  </div>
  <h1>RELATÓRIO DE ATENDIMENTO DE OCORRÊNCIA</h1>

  <label style="text-align: center">
  NÚMERO: <input type="text" name="numero" style="width: 70px;" readonly> ANO: <input type="text" name="ano" style="width: 52px;"></label>
  <div class="linha-horizontal">
    <label>Data: <input type="date" name="data"></label>
    <label>Hora Início: <input type="time" name="hora_inicio"></label>
    <label>Hora Término: <input type="time" name="hora_termino"></label>
  </div>
  <div class="linha-horizontal">
    <label>2 - SOLICITANTE: <input type="text" name="solicitante"></label>
    <label>NÚMERO DO TELEFONE: <input type="text" name="telefone"></label>
  </div>
  <label>LOCAL DA OCORRÊNCIA:
 <input type="text" name="local" id="local" placeholder="Ative a localização para preencher automaticamente"> 
</label>
  <label>SITUAÇÃO INFORMADA: <textarea name="situacao" style="min-height: 45px"></textarea></label>
  <label>3 - RELATÓRIO DO ATENDIMENTO E AÇÕES REALIZADAS: <textarea name="relatorio"></textarea></label>
  <label>- Autos de infração lavrados: <input type="text" name="autos"></label>
  <label>- Número de pessoas atendidas: <input type="text" name="pessoas_atendidas"></label>
  <label>- Veículos recolhidos: <input type="text" name="veiculos"></label>

  <div class="equipe">
    <label style="background-color: white; width: 105px; text-align: center; margin-top: 1px">👮 EQUIPE:</label>
    <div class="linha-horizontal-2">
      <label>Agente 1 (Responsável pelo preenchimento): <input type="text" name="responsavel"></label>
      <label>Nome Agente 2: <input type="text" name="assinatura2"></label>
    </div>
    <div class="linha-horizontal-3">
      <label>Nome Agente 3: <input type="text" name="assinatura3"></label>
      <label>Nome Agente 4: <input type="text" name="assinatura4"></label>
    </div>
    <label>VTR(s): <input type="text" name="vtr"></label>
   </div> 
  <div class="assinatura">
    <label>Assinaturas (Agentes 1, 2, 3 e 4):</label>
    <canvas id="assinatura" width="690" height="170"></canvas><br>
  </div>

  <p><strong>OBS:</strong> Este documento é uma coleta preliminar de dados, para controle de atendimentos de ACIDENTES/OCORRÊNCIA da SMDSM, e não substitui o registro realizado por outros órgãos.</p>

  <div class="neumann">
    <div style="position: relative;">
      <label style="position: absolute; right: 0;">© 2025 Leonildo.Neumann</label>
    </div>
  </div>
  <!-- 🔹 Seção para fotos -->
  
  <input type="file" id="fotoInput" accept="image/*" multiple style="display:none">
  <div id="fotos-container">
    <label>Fotos do Local:</label><br>
  </div>
</div>


<div style="padding: 6px 10px; margin-top: 1px; background-color: #D6FFFF; border-radius: 4px">
<button class="btn" onclick="limparAssinatura()" style="background-color: white; color: #15400e; margin-top: 5px">Limpar Assinaturas</button>
<button class="btn" onclick="document.getElementById('fotoInput').click()" style="background-color: white; color: #15400e; margin-top: 2px">📸 Incluir Fotos no Relatório</button>
</div>
<button type="button" onclick="obterNumeroGlobal(); this.style.backgroundColor='#D6FFFF'; this.style.color='#c0c0c0'; this.innerHTML='✅Relatório Finalizado!';" style="border: 3px solid #15400e">Finalizar Relatório</button>
<button class="btn" onclick="compartilharPDF(); this.style.backgroundColor='#D6FFFF'; this.style.color='#c0c0c0'; this.innerHTML='✅PDF Compartilhado!';">Compartilhar PDF</button>
<button class="btn" onclick="gerarPDF(); this.style.backgroundColor='#D6FFFF'; this.style.color='#c0c0c0'; this.innerHTML='✅PDF Baixado!';">Baixar PDF</button>
  
<div style="background-color: #dbead5; margin-top: 4px; padding: 1px 10px 6px 10px; border-radius: 4px; margin-bottom: 12px">
<label style="font-size: 17px; margin-bottom: 1px">📸 Fotos da Ocorrência:</label>
<input 
  type="file" 
  id="fotosOcorrencia" 
  accept="image/*" 
  multiple style="font-size: 16px"
>

</div>
